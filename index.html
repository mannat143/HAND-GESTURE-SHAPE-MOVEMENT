<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D Particles</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            pointer-events: none;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 5px;
        }
        /* Mirror the video feed so it feels natural */
        video {
            display: none;
            transform: scaleX(-1);
        }
    </style>
</head>
<body>

    <div id="info">
        <b>Hand Controls:</b><br>
        Pinch/Spread: Scale Particles<br>
        Move Hand: Change Colors<br>
        Open/Close Hand: Morph Shapes
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script type="module">
        import * as THREE from 'three';

        // --- 1. SETUP THREE.JS SCENE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        camera.position.z = 5;

        // --- 2. PARTICLE SYSTEM INITIALIZATION ---
        const particleCount = 15000;
        const geometry = new THREE.BufferGeometry();
        const posArray = new Float32Array(particleCount * 3);
        const targetArray = new Float32Array(particleCount * 3); // For morphing

        // Create initial random sphere
        for (let i = 0; i < particleCount; i++) {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos((Math.random() * 2) - 1);
            posArray[i * 3] = Math.sin(phi) * Math.cos(theta) * 2;
            posArray[i * 3 + 1] = Math.sin(phi) * Math.sin(theta) * 2;
            posArray[i * 3 + 2] = Math.cos(phi) * 2;
            
            // Fill target with same values initially
            targetArray[i * 3] = posArray[i * 3];
            targetArray[i * 3 + 1] = posArray[i * 3 + 1];
            targetArray[i * 3 + 2] = posArray[i * 3 + 2];
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        
        const material = new THREE.PointsMaterial({
            size: 0.015,
            color: 0xffffff,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending
        });

        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        // --- 3. SHAPE TEMPLATES (MATH) ---
        function setHeartShape() {
            for (let i = 0; i < particleCount; i++) {
                const t = Math.random() * Math.PI * 2;
                const r = Math.random(); 
                // Heart formula
                const x = 1.6 * Math.pow(Math.sin(t), 3);
                const y = 1.3 * Math.cos(t) - 0.5 * Math.cos(2*t) - 0.2 * Math.cos(3*t) - 0.1 * Math.cos(4*t);
                targetArray[i * 3] = x * r;
                targetArray[i * 3 + 1] = y * r;
                targetArray[i * 3 + 2] = (Math.random() - 0.5) * 0.5;
            }
        }

        function setSphereShape() {
            for (let i = 0; i < particleCount; i++) {
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);
                targetArray[i * 3] = Math.sin(phi) * Math.cos(theta) * 2;
                targetArray[i * 3 + 1] = Math.sin(phi) * Math.sin(theta) * 2;
                targetArray[i * 3 + 2] = Math.cos(phi) * 2;
            }
        }

        // --- 4. MEDIAPIPE HAND TRACKING ---
        const videoElement = document.createElement('video');
        
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                // Interaction 1: Scale based on pinch
                const dist = Math.hypot(landmarks[8].x - landmarks[4].x, landmarks[8].y - landmarks[4].y);
                const targetScale = dist * 8;
                particleSystem.scale.lerp(new THREE.Vector3(targetScale, targetScale, targetScale), 0.1);

                // Interaction 2: Color based on position
                particleSystem.material.color.setHSL(landmarks[8].x, 0.8, 0.6);

                // Interaction 3: Morph based on finger count (Simple Open/Close hand logic)
                // If middle finger tip is lower than palm, assume "fist"
                if (landmarks[12].y > landmarks[9].y) {
                    setHeartShape();
                } else {
                    setSphereShape();
                }
            }
        });

        const mediapipeCamera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({ image: videoElement }); },
            width: 640, height: 480
        });
        mediapipeCamera.start();

        // --- 5. ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            // Smoothly morph positions
            const positions = geometry.attributes.position.array;
            for (let i = 0; i < positions.length; i++) {
                positions[i] += (targetArray[i] - positions[i]) * 0.05; // LERP for smooth transition
            }
            geometry.attributes.position.needsUpdate = true;

            // Rotation for effect
            particleSystem.rotation.y += 0.002;

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
